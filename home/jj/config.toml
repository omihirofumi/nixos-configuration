#:schema https://docs.jj-vcs.dev/latest/config-schema.json

[user]
email = "99390907+omihirofumi@users.noreply.github.com"
name = "omihirofumi"

[ui]
merge-editor = ":builtin"
default-command = "log"
# Use Difftastic by default
diff-formatter = ["difft", "--color=always", "$left", "$right"]

[colors]
change_id = "#ff1525"

[aliases]
aicommit = ["util", "exec", "--", "codex", "--dangerously-bypass-approvals-and-sandbox", "exec", "Review the diff, then commit and use `jj commit -m 'message'`. Follow conventional commits. Do nothing else."]
clone = ["util", "exec", "--", "zsh", "-ic", """
cmd="${1:-}"
shift || true
case "$cmd" in
  gc)
    jclone-gc "$@"
    ;;
  "")
    jclone
    ;;
  *)
    jclone "$cmd" "$@"
    ;;
esac
""", "jj-clone"]

[remotes.origin]
auto-track-created-bookmarks = "*"
